  <!-- ======= PROMINENT FAR 135 TEXT ======= -->
  <!-- Large primary label -->
  <text x="256" y="158" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900"
        fill="white" letter-spacing="2">FAR 135</text>
  <!-- Subtitle -->
  <text x="256" y="196" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="18" font-weight="600"
        fill="white" opacity="0.55" letter-spacing="3">§ 135.267</text>

  <!-- Divider line below text -->
  <line x1="180" y1="212" x2="332" y2="212" stroke="white" stroke-width="1" opacity="0.25"/>

  <!-- ======= AIRPLANE SILHOUETTE (top-down, nose pointing to 12) ======= -->
  <!--
    Fuselage: narrow tapered body, nose at y=218, tail at y=388
    Wings: start at y=272, sweep back to tips at y=315, span ±124px
    Horizontal stab: at y=352, span ±52px — clearly smaller than wings
    All straight up, no rotation — reads clearly as aircraft not propeller
  -->
  <path d="
    M 256,218
    C 261,236 268,256 269,273
    L 382,312
    L 360,332
    L 268,302
    L 266,352
    L 312,361
    L 308,372
    L 263,364
    L 261,388
    L 251,388
    L 249,364
    L 204,372
    L 200,361
    L 246,352
    L 244,302
    L 152,332
    L 130,312
    L 243,273
    C 244,256 251,236 256,218
    Z
  " fill="white"/>

  <!-- Cockpit/canopy detail on nose -->
  <ellipse cx="256" cy="242" rx="5" ry="10" fill="#1e3a5f" opacity="0.5"/>

  <!-- Kollsman window -->
  <rect x="354" y="230" width="62" height="24" rx="5" fill="#0a1a2e" stroke="#4a7aaa" stroke-width="1.5"/>
  <text x="385" y="242" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-size="11" fill="#7ab8f5" font-weight="bold" letter-spacing="0.5">29.92</text>

  <!-- Center cap at wing root -->
  <circle cx="256" cy="302" r="7" fill="#0f2540"/>
  <circle cx="256" cy="302" r="3" fill="white" opacity="0.5"/>

</svg>
